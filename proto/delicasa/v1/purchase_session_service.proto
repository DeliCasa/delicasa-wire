syntax = "proto3";

package delicasa.v1;

import "delicasa/v1/purchase_session.proto";

// PurchaseSessionService provides operations for managing customer purchase sessions.
service PurchaseSessionService {
  rpc GetPurchaseSession(GetPurchaseSessionRequest) returns (GetPurchaseSessionResponse);
  rpc ListPurchaseSessions(ListPurchaseSessionsRequest) returns (ListPurchaseSessionsResponse);
}

message GetPurchaseSessionRequest {
  string correlation_id = 1;
  string session_id = 2;
}

message GetPurchaseSessionResponse {
  string correlation_id = 1;
  PurchaseSession session = 2;
}

message ListPurchaseSessionsRequest {
  string correlation_id = 1;
  string controller_id = 2;
  PurchaseSessionStatus status = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListPurchaseSessionsResponse {
  string correlation_id = 1;
  repeated PurchaseSession sessions = 2;
  string next_page_token = 3;
}
