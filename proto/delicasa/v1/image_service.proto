syntax = "proto3";

package delicasa.v1;

import "delicasa/v1/image.proto";
import "google/protobuf/timestamp.proto";

// ImageService provides image browsing and presigned URL generation
// for client applications (NextClient → BridgeServer).
service ImageService {
  // List images for a controller, optionally filtered by container.
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);

  // Search images with advanced filters (session, capture tag, date range).
  rpc SearchImages(SearchImagesRequest) returns (SearchImagesResponse);

  // Generate a presigned download URL for an image in object storage.
  rpc GetPresignedUrl(GetPresignedUrlRequest) returns (GetPresignedUrlResponse);
}

message ListImagesRequest {
  string correlation_id = 1;
  string controller_id = 2;
  string container_id = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListImagesResponse {
  string correlation_id = 1;
  repeated Image images = 2;
  string next_page_token = 3;
  int32 total_count = 4;
}

message SearchImagesRequest {
  string correlation_id = 1;
  string controller_id = 2;
  string container_id = 3;
  string session_id = 4;
  string capture_tag = 5;
  google.protobuf.Timestamp from_date = 6;
  google.protobuf.Timestamp to_date = 7;
  ImageSortField sort_by = 8;
  int32 page_size = 9;
  string page_token = 10;
}

message SearchImagesResponse {
  string correlation_id = 1;
  repeated Image images = 2;
  string next_page_token = 3;
  int32 total_count = 4;
}

message GetPresignedUrlRequest {
  string correlation_id = 1;
  string object_key = 2;
  int32 expires_in_seconds = 3;
}

message GetPresignedUrlResponse {
  string correlation_id = 1;
  string url = 2;
  google.protobuf.Timestamp expires_at = 3;
}
