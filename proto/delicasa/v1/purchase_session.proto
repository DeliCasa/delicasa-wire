syntax = "proto3";

package delicasa.v1;

import "google/protobuf/timestamp.proto";

// PurchaseSessionStatus represents the lifecycle state of a purchase session.
enum PurchaseSessionStatus {
  PURCHASE_SESSION_STATUS_UNSPECIFIED = 0;
  PURCHASE_SESSION_STATUS_ACTIVE = 1;
  PURCHASE_SESSION_STATUS_COMPLETED = 2;
  PURCHASE_SESSION_STATUS_EXPIRED = 3;
  PURCHASE_SESSION_STATUS_CANCELLED = 4;
}

// PurchaseItem represents a single product taken from a container during a session.
message PurchaseItem {
  string product_id = 1;
  int32 quantity = 2;
  string container_id = 3;
}

// PurchaseSession represents a customer's active interaction with a controller.
message PurchaseSession {
  string id = 1;
  string controller_id = 2;
  PurchaseSessionStatus status = 3;
  repeated PurchaseItem items = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
}
